# cargo-audit configuration.
#
# Advisories listed here are known, reviewed, and accepted. Everything else
# fails `cargo audit` (see the Security Audit job in .github/workflows/ci.yml).

[advisories]
ignore = [
    # quick-xml 0.23 DoS (quadratic attribute scan / unbounded namespace alloc).
    # Pulled ONLY as an OPTIONAL transitive dep of self_update's S3 release
    # backend. The CLI enables only the archive-zip / archive-tar / flate2 /
    # zip-deflate features (see cli/Cargo.toml), so the S3 backend — and this
    # quick-xml — is never compiled; it appears solely in Cargo.lock, which
    # cargo audit scans regardless of feature activation. unpdf has NO direct
    # quick-xml dependency, so nothing reachable is affected and there is no
    # upstream fix to pick up. Remove these entries if self_update drops the
    # quick-xml 0.23 pin.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
